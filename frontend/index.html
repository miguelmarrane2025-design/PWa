<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />

    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BotSquad" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#030712" />

    <!-- SEO -->
    <meta name="description" content="BotSquad — 37 AI skills: audio processing, content creation, marketing, growth." />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-startup-image" href="/splash/splash-1290x2796.png"
      media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/splash/splash-1179x2556.png"
      media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/splash/splash-1170x2532.png"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/splash/splash-750x1334.png"
      media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />

    <title>BotSquad</title>
  </head>
  <body>
    <div id="root">
      <!-- Boot spinner — replaced immediately when React mounts -->
      <div id="boot-loader" style="
        min-height:100dvh;
        display:flex;
        align-items:center;
        justify-content:center;
        background:#030712;
        flex-direction:column;
        gap:16px;
      ">
        <div style="
          width:40px;height:40px;
          border-radius:10px;
          background:#4f6ef7;
          display:flex;align-items:center;justify-content:center;
          font-size:22px;font-weight:900;color:#fff;
          font-family:system-ui,sans-serif;
        ">B</div>
        <div style="
          width:24px;height:24px;
          border:3px solid #1f2937;
          border-top-color:#4f6ef7;
          border-radius:50%;
          animation:spin .8s linear infinite;
        "></div>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
