# ─── BotSquad default CamillaDSP pipeline ────────────────────────────────────
# This config is validated against CamillaDSP 4.x schema.
# Used when no custom config is provided by the user.
# ─────────────────────────────────────────────────────────────────────────────

devices:
  samplerate: 44100
  chunksize: 1024
  channels: 2
  target_level: 0
  adjust_period: 10
  enable_rate_adjust: false
  capture:
    type: File
    filename: "/app/storage/temp/camilla_input.raw"
    format: S16LE
    channels: 2
  playback:
    type: File
    filename: "/app/storage/temp/camilla_output.raw"
    format: S16LE
    channels: 2

filters:
  lowpass:
    type: Biquad
    parameters:
      type: Lowpass
      freq: 18000
      q: 0.707

  highpass:
    type: Biquad
    parameters:
      type: Highpass
      freq: 20
      q: 0.707

  peaking_3k:
    type: Biquad
    parameters:
      type: Peaking
      freq: 3000
      gain: 1.5
      q: 1.0

  volume:
    type: Gain
    parameters:
      gain: 0.0
      inverted: false

pipeline:
  - type: Filter
    channel: 0
    names:
      - highpass
      - peaking_3k
      - lowpass
      - volume
  - type: Filter
    channel: 1
    names:
      - highpass
      - peaking_3k
      - lowpass
      - volume
